<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mural Interactivo - Del Olvido a la Historia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@700&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mural-container">
        <!-- FONDO BASE -->
        <img src="assets/mural-fondo-base.webp" class="layer">
        <!-- PÚBLICO -->
        <img src="assets/p1971-publico-2.png" class="layer wave-layer-2">
        <img src="assets/p1971-publico-1.png" class="layer wave-layer-1">
        <!-- ELEMENTOS PASADO -->
        <img src="assets/p1971-jugadoras.png"      class="layer glow-double" id="glow-jugadoras">
        <img src="assets/p1971-texto-historia.png"  class="layer" id="glow-historia">
        <img src="assets/p1971-letrero-azteca.png"  class="layer glow-double" id="glow-azteca">
        <!-- GRIETAS -->
        <img src="assets/centro-grieta-negra.png"  class="layer">
        <img src="assets/centro-grieta-verde.png"  class="layer" id="grieta-verde">
        <!-- PERSONAJES PRESENTE -->
        <img src="assets/f2026-ingeniera.png"       class="layer glow-simple" id="glow-ingeniera">
        <img src="assets/f2026-doctora.png"         class="layer glow-simple" id="glow-doctora">
        <img src="assets/f2026-futbolista.png"      class="layer glow-simple" id="glow-futbolista">
        <img src="assets/f2026-repartidora.png"     class="layer glow-simple" id="glow-repartidora">
        <img src="assets/f2026-bombera.png"         class="layer glow-simple" id="glow-bombera">
        <img src="assets/f2026-maestra.png"         class="layer glow-simple" id="glow-maestra">
        <img src="assets/f2026-texto-nosotras.png"  class="layer" id="glow-nosotras"> 
        <!-- NIÑA Y CRÉDITOS -->
        <img src="assets/nina-base.png"             class="layer glow-simple" id="glow-nina">
        <img src="assets/p1971-creditos.png"        class="layer" id="img-creditos-btn">
        <!-- BALÓN -->
        <img src="assets/centro-balon-loader.png" id="balon-loader">

        <!-- ZONAS CLICKEABLES -->
        <div class="zona" id="zona-historia"    data-target="glow-historia"   style="top:0%;  left:0%;   width:16%; height:20%;"></div>
        <div class="zona" id="zona-jugadoras"   data-target="glow-jugadoras"  style="top:25%; left:0%;   width:30%; height:45%;"></div>
        <div class="zona" id="zona-azteca"      data-target="glow-azteca"     style="top:0%;  left:18%;  width:30%; height:21%;"></div>
        <div class="zona" id="zona-futbolista"  data-target="glow-futbolista" style="top:15%; left:50%;   width:14%; height:30%;"></div>
        <div class="zona" id="zona-doctora"     data-target="glow-doctora"    style="top:0%;  left:65%;  width:11%; height:35%;"></div>
        <div class="zona" id="zona-ingeniera"   data-target="glow-ingeniera"  style="top:0%;  left:76%;  width:11%; height:35%;"></div>
        <div class="zona" id="zona-maestra"     data-target="glow-maestra"    style="top:35%; left:60%;  width:9%; height:50%;"></div>
        <div class="zona" id="zona-bombera"     data-target="glow-bombera"    style="top:35%; left:70%;  width:11%; height:50%;"></div>
        <div class="zona" id="zona-repartidora" data-target="glow-repartidora"style="top:30%; left:83%;  width:8%; height:50%;"></div>
        <div class="zona" id="zona-nosotras"    data-target="glow-nosotras"   style="top:0%;  left:90%;  width:10%; height:22%;"></div>
        <div class="zona" id="zona-nina"        data-target="glow-nina"       style="top:42%; left:92%;  width:8%; height:60%;"></div>
        <div class="zona" id="zona-creditos"    data-target="img-creditos-btn"style="top:80%; left:0%;   width:8%;  height:20%;"></div>

        <!-- MODAL CRÉDITOS -->
        <div id="modal-creditos" class="modal">
            <img src="assets/p1971-creditos-1.png" id="img-creditos-panel">
            <button id="cerrar-creditos">CERRAR</button>
        </div>

        <!-- MODAL MULTIMEDIA -->
        <div id="modal-media" class="modal">
            <div id="media-contenido"></div>
            <button id="cerrar-media">CERRAR</button>
        </div>

        <!-- OVERLAY NIÑA -->
        <div id="nina-overlay"></div>

        <!-- VFX NIÑA -->
        <div id="nina-vfx"></div>

        <!-- CONTROLES NIÑA: nav izquierda vertical, cerrar arriba derecha -->
        <div id="nina-controles" style="display:none;position:absolute;inset:0;pointer-events:none;z-index:200;">

            <!-- Flecha atrás — superior izquierda, todas las niñas -->
            <button id="nina-back"
                style="position:absolute;top:2.5%;left:1.5%;pointer-events:auto;
                background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);color:#fff;
                width:clamp(20px,3vw,28px);height:clamp(20px,3vw,28px);
                border-radius:50%;cursor:pointer;font-size:clamp(.5rem,1.1vw,.75rem);
                display:flex;align-items:center;justify-content:center;
                backdrop-filter:blur(4px);touch-action:manipulation;">←</button>

            <!-- Nav prev/contador/next — lado izquierdo centrado -->
            <div style="position:absolute;left:1.2%;top:50%;transform:translateY(-50%);
                display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:auto;">
                <button id="nina-prev"
                    style="background:#cc0022;border:1px solid rgba(255,80,80,.5);
                    color:#fff;width:clamp(20px,3vw,27px);height:clamp(20px,3vw,27px);
                    border-radius:50%;cursor:pointer;font-size:clamp(.5rem,1.1vw,.72rem);
                    display:flex;align-items:center;justify-content:center;
                    backdrop-filter:blur(4px);touch-action:manipulation;
                    box-shadow:0 0 6px rgba(200,0,30,.5);">◀</button>
                <span id="nina-contador"
                    style="color:#fff;font-family:sans-serif;font-size:clamp(.4rem,.85vw,.58rem);
                    text-align:center;opacity:.85;writing-mode:vertical-rl;letter-spacing:1px;">1/8</span>
                <button id="nina-next"
                    style="background:#006622;border:1px solid rgba(80,200,80,.5);
                    color:#fff;width:clamp(20px,3vw,27px);height:clamp(20px,3vw,27px);
                    border-radius:50%;cursor:pointer;font-size:clamp(.5rem,1.1vw,.72rem);
                    display:flex;align-items:center;justify-content:center;
                    backdrop-filter:blur(4px);touch-action:manipulation;
                    box-shadow:0 0 6px rgba(0,160,50,.5);">▶</button>
            </div>

            <!-- Cerrar — superior derecha -->
            <button id="nina-cerrar"
                style="position:absolute;top:2.5%;right:1.5%;
                background:#ff0055;border:none;color:#fff;
                width:clamp(20px,3vw,27px);height:clamp(20px,3vw,27px);
                border-radius:50%;cursor:pointer;font-size:clamp(.5rem,1.1vw,.72rem);
                display:flex;align-items:center;justify-content:center;
                box-shadow:0 0 8px rgba(255,0,85,.7);pointer-events:auto;
                backdrop-filter:blur(4px);touch-action:manipulation;">✕</button>
        </div>


        <!-- GALAXIA / CORAZONES -->
        <div id="galaxia-overlay"></div>
        <div id="frases-container"></div>
        <button id="cerrar-galaxia">✕</button>

    </div>

    <script src="main.js"></script>
</body>
</html>
